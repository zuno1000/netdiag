<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>通信診断</title>
<meta name="theme-color" content="#0f6e56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: #f5f5f2; color: #1a1a1a;
  }
  main { max-width: 520px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 20px; font-weight: 600; margin: 8px 0 16px; }
  #runBtn {
    width: 100%; padding: 14px; font-size: 17px; font-weight: 600;
    color: #fff; background: #0f6e56; border: none; border-radius: 12px;
  }
  #runBtn:disabled { opacity: 0.5; }
  ul { list-style: none; padding: 0; margin: 20px 0; }
  li {
    display: flex; align-items: center; gap: 10px;
    background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  }
  .icon { font-size: 18px; width: 24px; text-align: center; }
  .ok { color: #1d9e75; } .ng { color: #d85a30; } .skip { color: #999; }
  .stage-name { font-weight: 600; font-size: 15px; }
  .detail { font-size: 12px; color: #666; }
  .ms { margin-left: auto; font-size: 13px; color: #666; font-variant-numeric: tabular-nums; }
  #diagnosis { background: #e1f5ee; border-radius: 12px; padding: 16px; margin-top: 4px; }
  #diagnosis.bad { background: #faece7; }
  #diagMsg { font-size: 16px; font-weight: 600; margin: 0 0 6px; }
  #diagSuggest { font-size: 14px; margin: 0; color: #444; }
  #diagDetail { font-size: 12px; margin: 6px 0 0; color: #777; }
  #road { margin: 16px 0 4px; }
  #road svg { width: 100%; height: auto; display: block; }
  #road .lbl { fill: #555; }
  details { margin: 12px 0; }
  summary { font-size: 14px; color: #666; }
  #log { display: flex; gap: 8px; align-items: center; margin: 8px 0 24px;
         font-size: 13px; color: #666; }
  #log button { padding: 6px 10px; font-size: 12px; color: inherit;
                background: transparent; border: 1px solid #bbb; border-radius: 8px; }
  #deepBtn { width: 100%; margin-top: 10px; padding: 12px; font-size: 15px;
             color: #0f6e56; background: transparent;
             border: 1px solid #0f6e56; border-radius: 12px; }
  #deepBtn:disabled { opacity: 0.5; }
  #progress { margin-top: 14px; }
  #progHead { display: flex; justify-content: space-between; gap: 8px;
              font-size: 13px; color: #666; margin-bottom: 6px; }
  #progTrack { height: 6px; background: #ddd; border-radius: 3px; overflow: hidden; }
  #progFill { height: 100%; width: 0%; background: #0f6e56;
              border-radius: 3px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #eee; }
    li { background: #2c2c2e; }
    .detail, .ms { color: #aaa; }
    #diagnosis { background: #0a3a2e; } #diagnosis.bad { background: #46220f; }
    #diagSuggest { color: #ccc; } #diagDetail { color: #999; }
    #road .lbl { fill: #bbb; }
    summary { color: #999; }
    #log { color: #999; }
    #log button { border-color: #555; }
    #deepBtn { color: #9fe1cb; border-color: #0f6e56; }
    #progHead { color: #999; }
    #progTrack { background: #3a3a3c; }
  }
</style>
</head>
<body>
<main>
  <h1>通信診断</h1>
  <button id="runBtn">診断する</button>
  <section id="road" hidden></section>
  <section id="diagnosis" hidden>
    <p id="diagMsg"></p>
    <p id="diagSuggest"></p>
    <p id="diagDetail"></p>
  </section>
  <button id="deepBtn" hidden>詳しく調べる（追加で最大約2MB通信）</button>
  <div id="progress" hidden>
    <div id="progHead"><span id="progLabel"></span><span id="progElapsed"></span></div>
    <div id="progTrack"><div id="progFill"></div></div>
  </div>
  <details>
    <summary>詳細データ</summary>
    <ul id="stages"></ul>
  </details>
  <section id="log">
    <span id="logCount"></span>
    <button id="csvBtn">CSVエクスポート</button>
    <button id="clearBtn">記録を消去</button>
  </section>
</main>

<script src="probe-engine.js"></script>
<script src="road-view.js"></script>
<script src="log-store.js"></script>
<script>
"use strict";
const engine = new NetDiag.Engine();
const runBtn = document.getElementById("runBtn");
const stagesEl = document.getElementById("stages");
const diagEl = document.getElementById("diagnosis");
const roadEl = document.getElementById("road");
const deepBtn = document.getElementById("deepBtn");
let lastOut = null;

// ---- 進捗表示（今なにをしていて、あとどのくらいか） ----
const progEl = document.getElementById("progress");
const progLabel = document.getElementById("progLabel");
const progFill = document.getElementById("progFill");
const progElapsed = document.getElementById("progElapsed");
let progTimer = null;
let progAnim = null;
let progT0 = 0;
let progTarget = 0;   // エンジンから通知された実進捗
let progShown = 0;    // 表示中の値（なめらかに追従）
let progEstimate = 10;
let progStoreKey = null;

function progressStart(defaultSec, storeKey) {
  // 前回の実測所要時間があれば、それを目安時間として使う（動的な目安）
  const last = Number(localStorage.getItem(storeKey));
  progEstimate = last > 0 ? Math.max(3, Math.round(last)) : defaultSec;
  progStoreKey = storeKey;
  progTarget = 0;
  progShown = 0;
  progT0 = performance.now();
  progEl.hidden = false;
  progFill.style.width = "0%";
  progLabel.textContent = "準備中…";
  progElapsed.textContent = `目安 約${progEstimate}秒`;
  clearInterval(progTimer);
  progTimer = setInterval(() => {
    const elapsed = (performance.now() - progT0) / 1000;
    if (progTarget >= 0.15) {
      // 実進捗と経過時間から残り時間を逆算
      const remain = Math.max(1,
        Math.round(elapsed * (1 - progTarget) / progTarget));
      progElapsed.textContent =
        `経過 ${Math.round(elapsed)}秒 / 残り 約${remain}秒`;
    } else {
      progElapsed.textContent =
        `経過 ${Math.round(elapsed)}秒（目安 約${progEstimate}秒）`;
    }
  }, 500);
  cancelAnimationFrame(progAnim);
  progressTick();
}

// バーは実進捗へなめらかに追従しつつ、少しだけ先へ這い進む。
// 実進捗+12%を超えないため「嘘の完了」にはならない
function progressTick() {
  const cap = Math.min(progTarget + 0.12, 0.98);
  progShown += (cap - progShown) * 0.015;
  if (progTarget > progShown) progShown += (progTarget - progShown) * 0.25;
  progFill.style.width = (Math.min(progShown, cap) * 100).toFixed(1) + "%";
  progAnim = requestAnimationFrame(progressTick);
}

function progressUpdate(label, frac) {
  progLabel.textContent = label;
  progTarget = Math.max(progTarget, frac);
}

function progressEnd() {
  clearInterval(progTimer);
  cancelAnimationFrame(progAnim);
  progLabel.textContent = "完了";
  progFill.style.width = "100%";
  // 今回の所要時間を保存し、次回の目安にする（瞬時に終わった回は除く）
  const sec = (performance.now() - progT0) / 1000;
  if (progStoreKey && sec >= 2) {
    try { localStorage.setItem(progStoreKey, sec.toFixed(1)); } catch { /* noop */ }
  }
  setTimeout(() => { progEl.hidden = true; }, 800);
}

const ICONS = { success: ["✓", "ok"], failure: ["✕", "ng"], skipped: ["−", "skip"] };

function renderStage(r) {
  const [mark, cls] = ICONS[r.outcome];
  const li = document.createElement("li");
  const ms = r.latencyMs != null ? `${Math.round(r.latencyMs)} ms` : "";
  li.innerHTML =
    `<span class="icon ${cls}">${mark}</span>` +
    `<span><div class="stage-name"></div><div class="detail"></div></span>` +
    `<span class="ms">${ms}</span>`;
  li.querySelector(".stage-name").textContent = NetDiag.StageNames[r.stage] || r.stage;
  li.querySelector(".detail").textContent = r.detail || "";
  stagesEl.appendChild(li);
}

function showDiagnosis(d) {
  diagEl.hidden = false;
  diagEl.className = d.key === "healthy" ? "" : "bad";
  document.getElementById("diagMsg").textContent = d.message;
  document.getElementById("diagSuggest").textContent = d.suggestion;
  document.getElementById("diagDetail").textContent = d.detail || "";
}

runBtn.addEventListener("click", async () => {
  runBtn.disabled = true;
  runBtn.textContent = "計測中…";
  stagesEl.innerHTML = "";
  diagEl.hidden = true;
  deepBtn.hidden = true;
  NetDiagView.scanning(roadEl); // 計測中は調査車が道路を巡回
  progressStart(10, "netdiag-dur-run");
  try {
    const out = await engine.run(renderStage, progressUpdate);
    if (out) {
      NetDiagView.show(roadEl, out.diagnosis);
      showDiagnosis(out.diagnosis);
      NetDiagLog.add(out.diagnosis, out.metrics); // 研究用ログ（端末内のみ）
      updateLogInfo();
      lastOut = out;
      // 「遅い/不安定」の時だけ詳細診断を提案する
      deepBtn.hidden = !["slow", "weakOrCongested"].includes(out.diagnosis.key);
    }
  } finally {
    runBtn.disabled = false;
    runBtn.textContent = "診断する";
    progressEnd();
  }
});

// ---- 詳細診断（原因のさらなる切り分け） ----
deepBtn.addEventListener("click", async () => {
  deepBtn.disabled = true;
  deepBtn.textContent = "詳細を計測中…";
  progressStart(15, "netdiag-dur-deep");
  try {
    const idle = lastOut && lastOut.metrics.stability
      ? lastOut.metrics.stability.meanRttMs : null;
    const out = await engine.deepRun(renderStage, idle, progressUpdate);
    if (out) {
      NetDiagView.show(roadEl, out.diagnosis);
      showDiagnosis(out.diagnosis);
      NetDiagLog.add(out.diagnosis, out.metrics);
      updateLogInfo();
      deepBtn.hidden = true;
    }
  } finally {
    deepBtn.disabled = false;
    deepBtn.textContent = "詳しく調べる（追加で最大約2MB通信）";
    progressEnd();
  }
});

// ---- 研究用ログUI ----
const logCountEl = document.getElementById("logCount");
function updateLogInfo() {
  logCountEl.textContent = `記録: ${NetDiagLog.count()}件`;
}
document.getElementById("csvBtn").addEventListener("click", () => {
  // BOM付きUTF-8にするとExcelで文字化けしない
  const blob = new Blob(["﻿" + NetDiagLog.toCSV()], { type: "text/csv;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `netdiag-log-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
});
document.getElementById("clearBtn").addEventListener("click", () => {
  if (confirm("記録をすべて消去しますか？")) {
    NetDiagLog.clear();
    updateLogInfo();
  }
});
updateLogInfo();

// PWA: 初回アクセス以降はオフラインでも開けるようにする
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
